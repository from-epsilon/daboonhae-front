<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Dialogs & banners</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; background: var(--bg-off-white); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .dialog { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 12px 32px rgba(0,0,0,.16); display: flex; flex-direction: column; gap: 8px; }
  .dialog .title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .dialog .desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
  .dialog .actions { display: flex; gap: 8px; margin-top: 12px; }
  .dialog .btn { flex: 1; padding: 12px; border-radius: 8px; font-family: var(--font-display); font-weight: 700; font-size: 14px; cursor: pointer; border: 0; }
  .dialog .btn--ghost { background: var(--gray-100); color: var(--text-primary); }
  .dialog .btn--cta { background: var(--brand-cta); color: white; }
  .info { display: flex; gap: 12px; padding: 14px 16px; border-radius: 8px; align-items: flex-start; font-family: var(--font-body); font-size: 13px; line-height: 1.5; }
  .info svg { flex-shrink: 0; margin-top: 1px; }
  .info--positive { background: var(--green-50); color: var(--green-800); }
  .info--info { background: var(--blue-50); color: var(--blue-800); }
  .info--warn { background: var(--red-50); color: var(--red-800); }
  .info--delay { background: var(--orange-50); color: var(--orange-800); }
  .info b { font-weight: 700; }
</style>
</head><body>
  <div class="stack">
    <div class="dialog">
      <div class="title">비교함에 추가할까요?</div>
      <div class="desc">최대 3개까지 함께 비교할 수 있어요. 현재 2개 담겨 있습니다.</div>
      <div class="actions">
        <button class="btn btn--ghost">취소</button>
        <button class="btn btn--cta">담기</button>
      </div>
    </div>
    <div class="info info--positive">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
      <div><b>다분해 점수 9.1점.</b> 단백질·저당·저칼로리 균형이 우수해요.</div>
    </div>
    <div class="info info--info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div>제조사 표기를 기반으로 한 공식 영양정보입니다.</div>
    </div>
    <div class="info info--delay">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div><b>당류가 높은 편이에요 (12g/회).</b> 다른 옵션과 함께 비교해 보세요.</div>
    </div>
  </div>
</body></html>
