<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 60px 1fr 80px; gap: 12px; align-items: center; padding: 6px 0; }
  .token { font-size: 11px; font-weight: 700; font-family: var(--font-numeric); }
  .bar { height: 12px; background: var(--green-500); border-radius: 2px; }
  .px { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-numeric); text-align: right; }
</style>
</head><body>
  <div class="row"><div class="token">space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="token">space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="token">space-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12 px</div></div>
  <div class="row"><div class="token">space-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 px</div></div>
  <div class="row"><div class="token">space-5</div><div><div class="bar" style="width:20px"></div></div><div class="px">20 px</div></div>
  <div class="row"><div class="token">space-6</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 px</div></div>
  <div class="row"><div class="token">space-8</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="token">space-10</div><div><div class="bar" style="width:40px"></div></div><div class="px">40 px</div></div>
  <div class="row"><div class="token">space-12</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 px</div></div>
  <div class="row"><div class="token">space-16</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 px</div></div>
</body></html>
