<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Navigation & tabs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: var(--bg-off-white); }
  .appbar { height: 52px; background: white; display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid var(--border-tertiary); }
  .brand { display: flex; align-items: center; gap: 6px; font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -.03em; color: var(--text-primary); }
  .appbar .search { flex: 1; background: var(--gray-100); border-radius: 999px; padding: 8px 14px; font-size: 13px; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px; }
  .appbar .icon { width: 22px; height: 22px; color: var(--gray-900); }
  .tabs { background: white; display: flex; padding: 0 8px; border-bottom: 1px solid var(--border-tertiary); }
  .tab { font-family: var(--font-display); font-size: 15px; font-weight: 500; padding: 14px 12px; color: var(--text-tertiary); position: relative; }
  .tab.--active { color: var(--text-primary); font-weight: 700; }
  .tab.--active::after { content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px; height: 2px; background: var(--gray-900); border-radius: 2px; }
  .bottom-bar { display: flex; background: white; height: 56px; border-top: 1px solid var(--border-tertiary); }
  .b-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--text-tertiary); font-size: 10px; font-weight: 500; position: relative; }
  .b-tab.--active { color: var(--green-500); }
  .b-tab .icon { width: 22px; height: 22px; }
  .b-tab .dot { position: absolute; top: 6px; right: calc(50% - 18px); background: var(--red-500); color: white; font-size: 9px; font-weight: 700; padding: 0 4px; border-radius: 999px; min-width: 14px; text-align: center; font-family: var(--font-numeric); }
</style>
</head><body>
  <div class="appbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 64 64">
        <path d="M 32 8 A 24 24 0 1 0 56 32" fill="none" stroke="#00C600" stroke-width="8" stroke-linecap="round"/>
        <circle cx="49.5" cy="14.5" r="4" fill="#00C600"/>
        <circle cx="41" cy="6.5" r="2.6" fill="#00C600" opacity=".75"/>
        <circle cx="57" cy="22" r="2.2" fill="#00C600" opacity=".5"/>
      </svg>
      다분해
    </div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      성분, 브랜드, 영양소로 검색
    </div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </div>
  <div class="tabs">
    <div class="tab --active">전체</div>
    <div class="tab">고단백</div>
    <div class="tab">저칼로리</div>
    <div class="tab">저당</div>
    <div class="tab">비건</div>
    <div class="tab">글루텐프리</div>
  </div>
  <div class="bottom-bar">
    <div class="b-tab --active">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      홈
    </div>
    <div class="b-tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      카테고리
    </div>
    <div class="b-tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
      <span class="dot">2</span>
      비교함
    </div>
    <div class="b-tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      MY
    </div>
  </div>
</body></html>
