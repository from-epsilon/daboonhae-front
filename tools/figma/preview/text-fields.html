<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Text fields</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; background: white; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 12px; font-weight: 700; color: var(--text-primary); }
  .input { font-family: var(--font-body); font-size: 14px; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-tertiary); background: white; color: var(--text-primary); outline: none; }
  .input.--active { border-color: var(--gray-900); border-width: 1.5px; padding: 11.5px 13.5px; }
  .input.--error { border-color: var(--red-500); }
  .input.--disabled { background: var(--gray-100); color: var(--text-tertiary); }
  .input::placeholder { color: var(--text-tertiary); }
  .help { font-size: 11px; color: var(--text-secondary); }
  .help.--error { color: var(--red-500); }
  .search { display: flex; gap: 8px; align-items: center; background: var(--gray-100); border-radius: 999px; padding: 10px 16px; }
  .search input { background: transparent; border: 0; outline: 0; flex: 1; font-size: 14px; font-family: var(--font-body); color: var(--text-primary); }
  .search svg { color: var(--text-tertiary); }
</style>
</head><body>
  <div class="grid">
    <div class="field">
      <div class="label">이메일</div>
      <input class="input" placeholder="example@gmarket.co.kr">
      <div class="help">아이디로 사용됩니다.</div>
    </div>
    <div class="field">
      <div class="label">비밀번호 (Active)</div>
      <input class="input --active" type="password" value="abcdef">
      <div class="help">8자 이상 입력해 주세요.</div>
    </div>
    <div class="field">
      <div class="label">전화번호 (Error)</div>
      <input class="input --error" value="010-1234">
      <div class="help --error">전화번호 형식이 올바르지 않습니다.</div>
    </div>
    <div class="field">
      <div class="label">회원 등급 (Disabled)</div>
      <input class="input --disabled" value="VIP" disabled>
      <div class="help">관리자에 의해 자동 설정됩니다.</div>
    </div>
  </div>
  <div style="margin-top: 20px;">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      <input placeholder="원하는 상품을 검색하세요">
    </div>
  </div>
</body></html>
