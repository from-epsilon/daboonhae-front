<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Gray scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .step { aspect-ratio: 1/1; border-radius: 6px; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-end; padding: 6px; font-size: 10px; font-family: var(--font-numeric); font-weight: 600; }
  .step .v { font-weight: 700; }
  .step .h { font-size: 9px; opacity: .7; }
  .step.--ink { color: var(--gray-900); }
  .step.--white { color: var(--white); }
  .step.--outlined { border: 1px solid var(--border-tertiary); }
  .bw { display: flex; gap: 8px; margin-top: 12px; }
  .bw .step { aspect-ratio: auto; width: calc(50% - 4px); height: 56px; border-radius: 8px; }
</style>
</head><body>
  <div class="ramp">
    <div class="step --ink --outlined" style="background:#FAFAFA"><div class="v">50</div><div class="h">#FAFAFA</div></div>
    <div class="step --ink" style="background:#F5F5F5"><div class="v">100</div><div class="h">#F5F5F5</div></div>
    <div class="step --ink" style="background:#EEEEEE"><div class="v">200</div><div class="h">#EEEEEE</div></div>
    <div class="step --ink" style="background:#E0E0E0"><div class="v">300</div><div class="h">#E0E0E0</div></div>
    <div class="step --ink" style="background:#BDBDBD"><div class="v">400</div><div class="h">#BDBDBD</div></div>
    <div class="step --white" style="background:#9E9E9E"><div class="v">500</div><div class="h">#9E9E9E</div></div>
    <div class="step --white" style="background:#757575"><div class="v">600</div><div class="h">#757575</div></div>
    <div class="step --white" style="background:#616161"><div class="v">700</div><div class="h">#616161</div></div>
    <div class="step --white" style="background:#424242"><div class="v">800</div><div class="h">#424242</div></div>
    <div class="step --white" style="background:#222222"><div class="v">900</div><div class="h">#222222</div></div>
  </div>
  <div class="bw">
    <div class="step --white" style="background:#000"><div class="v">Black</div><div class="h">#000000</div></div>
    <div class="step --ink --outlined" style="background:#fff"><div class="v">White</div><div class="h">#FFFFFF</div></div>
  </div>
</body></html>
