<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .specimen { display: grid; grid-template-columns: 1fr 130px; gap: 12px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border-tertiary); }
  .specimen:last-child { border-bottom: none; }
  .text { font-family: var(--font-display); color: var(--text-primary); line-height: 1.3; }
  .meta { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-numeric); text-align: right; }
  .meta b { display: block; color: var(--text-primary); font-size: 11px; font-weight: 700; }
</style>
</head><body>
  <div class="specimen">
    <div class="text" style="font-size: 24px;">오늘은 어떻게 먹어볼까요</div>
    <div class="meta"><b>Heading 1</b>xxxl · 24 / 400</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-size: 22px;">MY 다분해</div>
    <div class="meta"><b>Heading 2</b>xxl · 22 / 400</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-size: 20px;">고단백 다이어트 식품</div>
    <div class="meta"><b>Heading 3</b>xl · 20 / 400</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-size: 18px;">홈 · 검색 · 비교함</div>
    <div class="meta"><b>Heading 4</b>l · 18 / 400</div>
  </div>
</body></html>
