<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>다분해 Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #f2f3f5, #d8dadd);
    font-family: var(--font-body);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px;
  }
  .phone-stage { display: flex; gap: 48px; align-items: flex-start; }
  .phone {
    width: 390px; height: 800px; background: white; border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 0 0 8px #111, 0 0 0 9px #2a2a2a;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar {
    height: 34px; background: white;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 24px 0;
    font-size: 14px; font-family: -apple-system, system-ui, sans-serif; font-weight: 600;
    color: var(--text-primary); flex-shrink: 0;
  }
  .status-bar .indicators { display: flex; gap: 5px; align-items: center; }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px; background: #111;
    border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 2;
  }
  #app { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-off-white); }

  .info { width: 280px; padding: 8px 0; }
  .info h1 {
    font-family: var(--font-display); font-size: 22px; font-weight: 700;
    margin: 0 0 4px; letter-spacing: -.02em;
    display: flex; align-items: center; gap: 8px;
  }
  .info .sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 24px; }
  .info .group { margin-bottom: 20px; }
  .info .group-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-tertiary); margin-bottom: 10px;
  }
  .info .nav { display: flex; flex-direction: column; gap: 6px; }
  .info .nav button {
    text-align: left; background: white;
    border: 1px solid var(--border-tertiary); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; font-family: var(--font-body);
    color: var(--text-primary); cursor: pointer;
  }
  .info .nav button:hover { background: var(--gray-100); }
  .info .nav button.--active {
    background: var(--gray-900); color: white; border-color: var(--gray-900);
  }
  .info .note {
    font-size: 11px; color: var(--text-tertiary); line-height: 1.5;
    background: white; padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--border-tertiary); margin-top: 12px;
  }
  .info .note b { color: var(--text-secondary); }
  .info .note code { font-family: var(--font-numeric); background: var(--gray-100); padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>

<div class="phone-stage">
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div class="indicators">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx=".5"/><rect x="4.5" y="4" width="3" height="7" rx=".5"/><rect x="9" y="2" width="3" height="9" rx=".5"/><rect x="13.5" y="0" width="3" height="11" rx=".5"/></svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 0a9.5 9.5 0 0 0-6.6 2.7c-.2.2-.2.6 0 .8l1 1c.2.2.5.2.7 0 1.3-1.2 3-1.9 4.9-1.9 1.9 0 3.6.7 4.9 1.9.2.2.5.2.7 0l1-1c.2-.2.2-.6 0-.8A9.5 9.5 0 0 0 7.5 0zm0 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="none" stroke="currentColor"><rect x=".5" y=".5" width="20" height="10" rx="2.5" /><rect x="21.5" y="3.5" width="1.5" height="4" rx=".5" fill="currentColor"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill="currentColor"/></svg>
      </div>
    </div>
    <div id="app"></div>
  </div>

  <div class="info">
    <h1>
      <svg width="22" height="22" viewBox="0 0 64 64">
        <path d="M 32 8 A 24 24 0 1 0 56 32" fill="none" stroke="#00C600" stroke-width="8" stroke-linecap="round"/>
        <circle cx="49.5" cy="14.5" r="4" fill="#00C600"/>
        <circle cx="41" cy="6.5" r="2.6" fill="#00C600" opacity=".75"/>
        <circle cx="57" cy="22" r="2.2" fill="#00C600" opacity=".5"/>
      </svg>
      다분해 Mobile
    </h1>
    <div class="sub">다이어트 식품 분석·비교 서비스 · UI kit prototype</div>
    <div class="group">
      <div class="group-label">화면 (Screen)</div>
      <div class="nav" id="screen-nav"></div>
    </div>
    <div class="note">
      <b>Try it:</b> 식품 카드 위의 <code>+</code> 버튼으로 비교함에 담아 보세요. 비교함에서 2-3개 식품의 영양·점수·가격을 한눈에 비교할 수 있어요.
    </div>
    <div class="note">
      <b>Font note:</b> Gmarket Sans 웹폰트가 없으면 Noto Sans KR로 대체됩니다. 점수·칼로리 숫자가 더 또렷하게 보이려면 <code>fonts/</code>에 TTF를 추가하세요.
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Search.jsx"></script>
<script type="text/babel" src="Category.jsx"></script>
<script type="text/babel" src="FoodDetail.jsx"></script>
<script type="text/babel" src="Compare.jsx"></script>
<script type="text/babel" src="MyD.jsx"></script>

<script type="text/babel">
  function App() {
    const [screen, setScreen] = React.useState("home");
    const [food, setFood] = React.useState(null);
    const [compareList, setCompareList] = React.useState([]);

    const navigate = (s, payload) => {
      if (s === "detail") setFood(payload);
      setScreen(s);
    };

    const addToCompare = (f) => {
      setCompareList(prev => {
        if (prev.find(c => c.id === f.id)) return prev;
        if (prev.length >= 3) return prev;
        return [...prev, f];
      });
    };

    // sidebar nav
    React.useEffect(() => {
      const screens = [
        { id: "home", label: "Home · 홈" },
        { id: "search", label: "Search · 검색" },
        { id: "category", label: "Category · 카테고리" },
        { id: "detail", label: "Food Detail · 식품 상세" },
        { id: "compare", label: "Compare · 비교함" },
        { id: "myd", label: "MY · 마이다분해" }
      ];
      const host = document.getElementById("screen-nav");
      host.innerHTML = "";
      screens.forEach(s => {
        const b = document.createElement("button");
        b.textContent = s.label;
        if (s.id === screen) b.classList.add("--active");
        b.onclick = () => {
          if (s.id === "detail" && !food) setFood(window.FOODS[0]);
          setScreen(s.id);
        };
        host.appendChild(b);
      });
    }, [screen, food]);

    let body;
    switch (screen) {
      case "home": body = <Home navigate={navigate} compareCount={compareList.length} addToCompare={addToCompare}/>; break;
      case "search": body = <Search navigate={navigate} addToCompare={addToCompare}/>; break;
      case "category": body = <Category navigate={navigate}/>; break;
      case "detail": body = <FoodDetail food={food} navigate={navigate} addToCompare={addToCompare}/>; break;
      case "compare": body = <Compare compareList={compareList} setCompareList={setCompareList} navigate={navigate}/>; break;
      case "myd": body = <MyD navigate={navigate}/>; break;
      default: body = null;
    }

    const showBottomNav = ["home", "category", "compare", "myd"].includes(screen);

    return (
      <>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0 }}>{body}</div>
        {showBottomNav && <BottomNav active={screen} onSelect={navigate} compareCount={compareList.length}/>}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
