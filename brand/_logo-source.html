<!doctype html><html><head><meta charset="utf-8">

<style>

  .wrap{display:inline-flex;align-items:center;gap:18px;padding:40px 56px}

</style></head>
<body>
<div id="target"><div class="wrap">
  <svg class="mark" width="132" height="132" viewBox="0 0 64 64" aria-hidden="true">
    <path d="M 32 8 A 24 24 0 1 0 56 32" fill="none" stroke="#00C600" stroke-width="7.5" stroke-linecap="round"/>
    <circle cx="49.5" cy="14.5" r="3.6" fill="#00C600"/>
    <circle cx="41" cy="6.5" r="2.4" fill="#00C600" opacity="0.75"/>
    <circle cx="57" cy="22" r="2" fill="#00C600" opacity="0.5"/>
  </svg>
  <span class="word"><span class="k">다</span><span class="g">분</span><span class="k">해</span><span class="k">.</span></span>
</div></div>
</body></html>
